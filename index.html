<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Metaetiquetas cruciales para comportamiento tipo App nativa en celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Pantalla Móvil COOSAJO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Animaciones */
        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            animation: scroll-left 25s linear infinite; /* Un poco más rápido para móvil */
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-progress {
            animation: progress 8s linear infinite;
        }
        
        /* Bloqueos para evitar zoom o scroll accidental al tocar la pantalla */
        body {
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="relative w-full h-screen bg-slate-100 overflow-hidden font-sans text-slate-800 flex flex-col m-0 p-0">
    
    <!-- Fondo de Imagen Estática -->
    <div 
        class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-60"
        style="background-image: url('abstract-white-background-with-elegant-curving-lin-2026-01-07-23-20-12-utc.jpg')"
    ></div>

    <!-- HEADER MÓVIL (Más compacto) -->
    <header class="relative z-10 bg-white/95 backdrop-blur-sm shadow-md flex items-center justify-between px-4 py-3 border-b-4 border-[#158e45] shrink-0">
        <!-- Logo -->
        <img 
            src="LOGO COOSAJO SIN ESLOGAN.png" 
            alt="Logo COOSAJO" 
            class="h-10 w-auto object-contain" 
        />

        <!-- Clima y Hora (Versión Minimalista) -->
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1 text-[#172e59]">
                <div id="weatherIconContainer">
                    <i data-lucide="cloud-sun" class="w-5 h-5"></i>
                </div>
                <span id="weatherTemp" class="font-bold text-sm">--°C</span>
            </div>
            <div class="h-6 w-px bg-slate-300"></div>
            <div class="flex flex-col items-end">
                <span id="clockTime" class="font-bold text-lg text-[#172e59] leading-none">--:--</span>
            </div>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL (Video arriba, Banners abajo) -->
    <main class="relative z-10 flex-1 flex flex-col w-full h-full min-h-0">
        
        <!-- ZONA 1: ÁREA DE VIDEO (16:9 Estricto adaptado a lo ancho del celular) -->
        <div class="w-full aspect-video bg-black relative shrink-0 shadow-xl z-20 flex items-center justify-center overflow-hidden border-b-2 border-white/20">
            
            <!-- REPRODUCTOR DE VIDEO LOCAL -->
            <!-- playsinline es OBLIGATORIO en celulares para que no se abra a pantalla completa nativa -->
            <video 
                id="localVideoPlayer"
                class="absolute inset-0 w-full h-full object-contain z-10" 
                autoplay 
                muted 
                playsinline
            >
                <source src="video1.mp4" type="video/mp4">
            </video>

            <!-- Placeholder visual en caso de que no haya video en la USB -->
            <div id="videoFallback" class="absolute inset-0 bg-gradient-to-br from-[#172e59] to-[#158e45] flex flex-col items-center justify-center z-0">
                <i data-lucide="monitor-play" class="w-12 h-12 text-white/50 mb-2"></i>
                <span class="text-white/80 font-bold text-sm">Cargando video local...</span>
            </div>

            <!-- Etiqueta Flotante Pequeña -->
            <div class="absolute top-2 left-2 z-20 bg-black/50 backdrop-blur-sm rounded-lg px-2 py-1 flex items-center gap-2">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-white text-xs font-semibold">Educación 2026</span>
            </div>
        </div>

        <!-- ZONA 2: BANNERS VERTICALES (Ocupan todo el espacio restante abajo) -->
        <div class="flex-1 w-full relative overflow-hidden bg-slate-800 shadow-inner group">
            <div id="bannersContainer" class="absolute inset-0 w-full h-full">
                <!-- Las imágenes se inyectan por JavaScript -->
            </div>

            <!-- Indicadores de progreso del carrusel móviles -->
            <div id="progressContainer" class="absolute top-3 left-0 right-0 flex justify-center gap-1.5 z-20 px-6">
                <!-- Los indicadores se inyectan por JavaScript -->
            </div>
        </div>

    </main>

    <!-- TICKER INFERIOR MÓVIL (Altura reducida) -->
    <footer class="relative z-10 h-12 bg-[#172e59] text-white flex items-center overflow-hidden shrink-0 shadow-[0_-5px_15px_rgba(0,0,0,0.2)]">
        <!-- Etiqueta Info compacta -->
        <div class="absolute left-0 top-0 bottom-0 z-20 bg-[#158e45] flex items-center px-3">
            <i data-lucide="info" class="w-5 h-5"></i>
            <!-- Triángulo -->
            <div class="absolute right-[-10px] top-1/2 transform -translate-y-1/2 w-0 h-0 border-y-[24px] border-y-transparent border-l-[10px] border-l-[#158e45]"></div>
        </div>

        <!-- Texto en movimiento (fuente un poco más pequeña para móvil) -->
        <div class="whitespace-nowrap animate-marquee flex items-center gap-8 text-sm font-medium ml-[60px]">
            <span>🌟 Tasa de interés ahorro infantil: <strong>4.5%</strong> anual.</span>
            <span class="text-[#158e45] text-lg">•</span>
            <span>💰 Compra <strong>Q7.70</strong> / Venta <strong>Q7.82</strong></span>
            <span class="text-[#158e45] text-lg">•</span>
            <span>📱 ¡Descarga nuestra App Micoope!</span>
            <span class="text-[#158e45] text-lg">•</span>
            <span>🔒 COOSAJO nunca pedirá contraseñas por teléfono.</span>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // --- RELOJ ---
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('clockTime').textContent = ahora.toLocaleTimeString('es-GT', { hour: '2-digit', minute: '2-digit', hour12: true });
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // --- CLIMA REAL ---
        async function fetchWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=14.5667&longitude=-89.35&current=temperature_2m,weather_code');
                const data = await response.json();
                const temp = Math.round(data.current.temperature_2m);
                document.getElementById('weatherTemp').textContent = `${temp}°C`;

                const code = data.current.weather_code;
                let iconName = 'sun'; 
                if (code >= 1 && code <= 3) iconName = 'cloud-sun'; 
                else if (code >= 45 && code <= 48) iconName = 'cloud-fog'; 
                else if (code >= 51 && code <= 82) iconName = 'cloud-rain'; 
                else if (code >= 95) iconName = 'cloud-lightning'; 

                document.getElementById('weatherIconContainer').innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5 text-[#172e59]"></i>`;
                lucide.createIcons();
            } catch (error) {
                console.error("Clima offline", error);
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 900000);

        // --- LISTA DE REPRODUCCIÓN DE VIDEOS LOCALES ---
        // Aquí puedes agregar los nombres de los videos que metas en la USB
        const listaVideos = [
            "video1.mp4",
            "video2.mp4", 
            "video3.mp4",
            "video4.mp4",
            "video5.mp4", // Agrega más si necesitas
        ];
        let videoActual = 0;
        const reproductor = document.getElementById('localVideoPlayer');

        // Cuando termina un video, pasa al siguiente de la lista en la USB
        reproductor.addEventListener('ended', () => {
            videoActual = (videoActual + 1) % listaVideos.length;
            reproductor.src = listaVideos[videoActual];
            reproductor.play().catch(e => console.log("Auto-play prevenido por el navegador."));
        });

        // --- SISTEMA DE BANNERS ---
        const banners = [
            { id: 1, img: "https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?auto=format&fit=crop&w=431&h=767&q=80" },
            { id: 2, img: "https://images.unsplash.com/photo-1556761175-5973dc0f32d7?auto=format&fit=crop&w=431&h=767&q=80" },
            { id: 3, img: "https://images.unsplash.com/photo-1512428559087-560fa5ceab42?auto=format&fit=crop&w=431&h=767&q=80" }
        ];

        let currentBanner = 0;
        const contenedorBanners = document.getElementById('bannersContainer');
        const contenedorProgreso = document.getElementById('progressContainer');

        banners.forEach((banner, index) => {
            const imgDiv = document.createElement('div');
            imgDiv.id = `banner-${index}`;
            imgDiv.className = `absolute inset-0 transition-opacity duration-1000 ${index === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0'}`;
            imgDiv.innerHTML = `<img src="${banner.img}" class="w-full h-full object-cover" />`;
            contenedorBanners.appendChild(imgDiv);

            const barraFondo = document.createElement('div');
            barraFondo.className = "h-1 flex-1 bg-white/40 rounded-full overflow-hidden";
            
            const barraActiva = document.createElement('div');
            barraActiva.id = `progreso-${index}`;
            barraActiva.className = index === 0 ? "h-full bg-[#158e45] w-full animate-progress rounded-full" : "h-full bg-[#158e45] w-full rounded-full opacity-0";
            
            barraFondo.appendChild(barraActiva);
            contenedorProgreso.appendChild(barraFondo);
        });

        setInterval(() => {
            currentBanner = (currentBanner + 1) % banners.length;
            banners.forEach((_, index) => {
                const bannerEl = document.getElementById(`banner-${index}`);
                const progresoEl = document.getElementById(`progreso-${index}`);
                if (index === currentBanner) {
                    bannerEl.className = "absolute inset-0 transition-opacity duration-1000 opacity-100 z-10";
                    progresoEl.className = "h-full bg-[#158e45] w-full animate-progress rounded-full";
                } else if (index < currentBanner) {
                    bannerEl.className = "absolute inset-0 transition-opacity duration-1000 opacity-0 z-0";
                    progresoEl.className = "h-full bg-[#158e45] w-full rounded-full opacity-100";
                } else {
                    bannerEl.className = "absolute inset-0 transition-opacity duration-1000 opacity-0 z-0";
                    progresoEl.className = "h-full bg-[#158e45] w-full rounded-full opacity-0";
                }
            });
        }, 8000);
    </script>
</body>
</html>
